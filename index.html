<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pomodoro Timer β</title>

<style>

body{
    font-family:sans-serif;
    text-align:center;
    margin:20px;
    max-width:600px;
    margin-left:auto;
    margin-right:auto;
}

h1{
    margin-bottom:30px;
}

#timer{
    font-size:72px;
    margin:30px 0;
    font-weight:bold;
}

input{
    width:70%;
    padding:12px;
    font-size:18px;
}

button{
    padding:12px 20px;
    margin:5px;
    font-size:18px;
    cursor:pointer;
}

ul{
    padding:0;
}

li{
    list-style:none;
    margin:10px 0;
}

.task-item{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

#counter{
    font-size:24px;
    margin-top:20px;
}

@media (max-width:600px){

    #timer{
        font-size:56px;
    }

    input{
        width:90%;
    }

    button{
        width:90%;
        max-width:300px;
    }
}

</style>
</head>

<body>

<h1>ポモドーロタイマー β</h1>

<h2>タスク管理</h2>

<input
    type="text"
    id="taskInput"
    placeholder="タスクを入力">

<br><br>

<button onclick="addTask()">タスク追加</button>

<ul id="taskList"></ul>

<hr>

<div id="timer">25:00</div>

<button onclick="startTimer()">開始</button>
<button onclick="stopTimer()">停止</button>
<button onclick="resetTimer()">リセット</button>

<div id="counter">
今日のポモドーロ数:
<span id="pomodoroCount">0</span>
</div>

<script>

let totalSeconds = 25 * 60;
let timer = null;
let running = false;

/* ---------- ポモドーロ回数 ---------- */

let pomodoroCount =
    Number(localStorage.getItem("pomodoroCount")) || 0;

document.getElementById("pomodoroCount").textContent =
    pomodoroCount;

/* ---------- タイマー表示 ---------- */

function updateDisplay(){

    let minutes =
        Math.floor(totalSeconds / 60);

    let seconds =
        totalSeconds % 60;

    document.getElementById("timer").textContent =
        String(minutes).padStart(2,"0")
        + ":"
        + String(seconds).padStart(2,"0");
}

/* ---------- 開始 ---------- */

function startTimer(){

    if(running) return;

    running = true;

    timer = setInterval(function(){

        if(totalSeconds > 0){

            totalSeconds--;
            updateDisplay();

        }
        else{

            clearInterval(timer);

            running = false;

            pomodoroCount++;

            document.getElementById("pomodoroCount")
                .textContent = pomodoroCount;

            localStorage.setItem(
                "pomodoroCount",
                pomodoroCount
            );

            showNotification();
            alert("25分経過しました！");
        }

    },1000);
}

/* ---------- 停止 ---------- */

function stopTimer(){

    clearInterval(timer);

    running = false;
}

/* ---------- リセット ---------- */

function resetTimer(){

    clearInterval(timer);

    running = false;

    totalSeconds = 25 * 60;

    updateDisplay();
}

/* ---------- タスク保存 ---------- */

function saveTasks(){

    let tasks = [];

    document
        .querySelectorAll(".task-text")
        .forEach(function(task){

            tasks.push(task.textContent);

        });

    localStorage.setItem(
        "tasks",
        JSON.stringify(tasks)
    );
}

/* ---------- タスク生成 ---------- */

function createTask(taskName){

    let li =
        document.createElement("li");

    let wrapper =
        document.createElement("div");

    wrapper.className =
        "task-item";

    let span =
        document.createElement("span");

    span.className =
        "task-text";

    span.textContent =
        taskName;

    let deleteButton =
        document.createElement("button");

    deleteButton.textContent =
        "削除";

    deleteButton.onclick =
        function(){

            li.remove();

            saveTasks();
        };

    wrapper.appendChild(span);

    wrapper.appendChild(deleteButton);

    li.appendChild(wrapper);

    document
        .getElementById("taskList")
        .appendChild(li);
}

/* ---------- タスク追加 ---------- */

function addTask(){

    let input =
        document.getElementById("taskInput");

    let taskName =
        input.value.trim();

    if(taskName === ""){

        alert(
            "タスク名を入力してください"
        );

        return;
    }

    createTask(taskName);

    saveTasks();

    input.value = "";
}

/* ---------- タスク復元 ---------- */

function loadTasks(){

    let tasks =
        JSON.parse(
            localStorage.getItem("tasks")
        ) || [];

    tasks.forEach(function(task){

        createTask(task);

    });
}

/* ---------- 初期化 ---------- */

loadTasks();
updateDisplay();

/* ---------- PWA ---------- */

if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
    });
}

/* ---------- 通知 ---------- */

if ("Notification" in window) {
    Notification.requestPermission();
}

function showNotification(){

    if(Notification.permission === "granted"){

        new Notification(
            "ポモドーロタイマー",
            {
                body:"25分経過しました！",
                icon:"./icon-192.png"
            }
        );
    }
}
</script>

</body>
</html>
